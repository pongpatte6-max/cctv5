<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color=1.0, user-scalable=no">
    <title>007 CCTV Mobile Sync (Dropdown Seconds)</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #121212; color: #e0e0e0; padding: 15px; margin: 0; }
        .wrapper { max-width: 500px; margin: 0 auto; padding-bottom: 40px; }
        
        h2 { text-align: center; color: #00ffcc; font-size: 24px; margin: 15px 0 5px 0; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { text-align: center; color: #ffffff; font-size: 18px; margin: 0 0 8px 0; font-weight: 600; letter-spacing: 0.5px; }
        .navy-top-link-block { text-align: center; margin-bottom: 25px; }
        .navy-top-link-block a { color: #ffcc00; font-size: 13px; text-decoration: none; border-bottom: 1px dashed #ffcc00; padding-bottom: 2px; display: inline-block; }

        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #2d2d2d; }
        .card-title { margin: 0 0 15px 0; font-size: 16px; font-weight: 600; }
        .step1-title { color: #ffcc00; }
        .step2-title { color: #00ffcc; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; }
        
        /* ดีไซน์แถวคู่: วันเวลาอยู่ซ้าย ปุ่มเลือกวินาทีอยู่ขวา */
        .time-input-row { display: flex; gap: 10px; }
        .time-input-row input[type="datetime-local"] { flex: 2; }
        .time-input-row select { flex: 1; text-align: center; text-align-last: center; font-weight: bold; color: #00ffcc; cursor: pointer; }

        input, select { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 8px; background: #252525; color: #fff; font-size: 16px; -webkit-appearance: none; }
        input:focus, select:focus { outline: none; border-color: #00ffcc; background: #2a2a2a; }
        
        button.btn-main { width: 100%; padding: 16px; background: #00ffcc; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 12px rgba(0,255,204,0.2); }
        button.btn-main:active { background: #00ccaa; }
        
        .result-box { margin-top: 20px; padding: 20px; background: #152522; border: 1px solid #00ffcc; border-radius: 12px; display: none; }
        .result-title { color: #88ffa8; font-size: 14px; font-weight: 600; }
        .result-time { color: #00ffcc; font-size: 24px; font-weight: bold; margin-top: 8px; line-height: 1.3; }
        .offset-info { color: #ffcc00; font-size: 13px; margin-top: 10px; font-style: italic; border-top: 1px dashed #2d2d2d; padding-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>🕵️‍♂️ CCTV TIME Calculator</h2>
    <div class="subtitle">สืบสวนเมืองลุง</div>
    
    <div class="navy-top-link-block">
        <a href="http://www.time2.navy.mi.th/" target="_blank">🌐 ตรวจสอบเวลามาตรฐานกองทัพเรือ: http://www.time2.navy.mi.th/</a>
    </div>
    
    <div class="card">
        <div class="card-title step1-title">⏱️ ขั้นตอนที่ 1: เทียบเวลา</div>
        
        <div class="form-group">
            <label>TIME DVR:</label>
            <div class="time-input-row">
                <input type="datetime-local" id="cctvCurrent">
                <select id="cctvCurrentSec"></select>
            </div>
        </div>
        
        <div class="form-group">
            <label>TIME กองทัพเรือ:</label>
            <div class="time-input-row">
                <input type="datetime-local" id="realCurrent">
                <select id="realCurrentSec"></select>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title step2-title">🎬 ขั้นตอนที่ 2: ระบุเวลาที่เกิดเหตุในคลิป</div>
        <div class="form-group">
            <label>วัน-เวลา และวินาทีกล้องตอนเกิดเหตุ (ในไฟล์คลิป):</label>
            <div class="time-input-row">
                <input type="datetime-local" id="cctvIncident">
                <select id="cctvIncidentSec"></select>
            </div>
        </div>
    </div>

    <button class="btn-main" onclick="calculateMobileTime()">⚡ คำนวณเวลาเกิดเหตุจริง</button>

    <div class="result-box" id="resultBox">
        <div class="result-title">🎯 เวลาเกิดเหตุจริง (กรมอุทกศาสตร์ กองทัพเรือ):</div>
        <div class="result-time" id="realTimeResult">--:--:--</div>
        <div class="offset-info" id="offsetResult"></div>
    </div>
</div>

<script>
// ฟังก์ชันอัตโนมัติในการสร้างตัวเลือกวินาที 00 - 59 วินาที ลงในทุกปุ่ม Dropdown เมื่อเปิดหน้าเว็บ
window.onload = function() {
    const dropdowns = ['cctvCurrentSec', 'realCurrentSec', 'cctvIncidentSec'];
    
    dropdowns.forEach(id => {
        const selectElement = document.getElementById(id);
        
        // สร้างตัวเลือกเริ่มต้นให้เห็นชัดๆ
        let defaultOpt = document.createElement('option');
        defaultOpt.value = "0";
        defaultOpt.text = "00 วินาที";
        selectElement.appendChild(defaultOpt);
        
        // วนลูปสร้างวิที่ 01 ถึง 59
        for(let i = 1; i <= 59; i++) {
            let opt = document.createElement('option');
            let formattedSec = String(i).padStart(2, '0');
            opt.value = i;
            opt.text = `${formattedSec} วินาที`;
            selectElement.appendChild(opt);
        }
    });
};

// ฟังก์ชันรวมวันเวลาและค่าจากปุ่มวินาทีเข้าด้วยกัน
function buildMsFromMobile(dateTimeVal, secVal) {
    if (!dateTimeVal) return 0;
    
    let safeString = dateTimeVal.replace('T', ' ').replace(/-/g, '/');
    let baseDate = new Date(safeString);
    
    let seconds = parseInt(secVal) || 0;
    baseDate.setSeconds(seconds);
    
    return baseDate.getTime();
}

function calculateMobileTime() {
    const cctvCurrentVal = document.getElementById('cctvCurrent').value;
    const cctvCurrentSec = document.getElementById('cctvCurrentSec').value;
    
    const realCurrentVal = document.getElementById('realCurrent').value;
    const realCurrentSec = document.getElementById('realCurrentSec').value;
    
    const cctvIncidentVal = document.getElementById('cctvIncident').value;
    const cctvIncidentSec = document.getElementById('cctvIncidentSec').value;

    if(!cctvCurrentVal || !realCurrentVal || !cctvIncidentVal) { 
        alert('บอสครับ รบกวนเลือกวัน-เวลาหลักให้ครบทุกช่องก่อนครับ!'); 
        return; 
    }

    // ประมวลผลโดยดึงค่าจากปุ่มเลือกวินาทีมาคำนวณร่วม
    const cctvCurrentMs = buildMsFromMobile(cctvCurrentVal, cctvCurrentSec);
    const realCurrentMs = buildMsFromMobile(realCurrentVal, realCurrentSec);
    const cctvIncidentMs = buildMsFromMobile(cctvIncidentVal, cctvIncidentSec);
    
    const offsetMs = realCurrentMs - cctvCurrentMs;

    let incidentDate = new Date();
    incidentDate.setTime(cctvIncidentMs + offsetMs);

    const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    document.getElementById('realTimeResult').innerText = incidentDate.toLocaleDateString('th-TH', options);
    
    const diffMsTotal = Math.abs(offsetMs);
    const totalSec = Math.floor(diffMsTotal / 1000);
    const diffDay = Math.floor(totalSec / 86400);
    const diffHr = Math.floor((totalSec % 86400) / 3600);
    const diffMin = Math.floor((totalSec % 3600) / 60);
    const diffSec = totalSec % 60;
    
    const statusText = offsetMs >= 0 ? "เดินช้ากว่าเวลาจริง" : "เดินเร็วกว่าเวลาจริง";
    
    let summaryText = `* ผลตรวจพิสูจน์: กล้องระบบ DVR ${statusText} อยู่ทั้งหมด `;
    if (diffDay > 0) summaryText += `${diffDay} วัน `;
    if (diffHr > 0 || diffDay > 0) summaryText += `${diffHr} ชั่วโมง `;
    summaryText += `${diffMin} นาที ${diffSec} วินาที`;
    
    document.getElementById('offsetResult').innerText = summaryText;

    const rBox = document.getElementById('resultBox');
    rBox.style.display = 'block';
    
    setTimeout(() => {
        rBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
}
</script>

</body>
</html>
